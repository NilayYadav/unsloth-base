name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        # ubuntu-latest ships ~14 GB free; the unsloth-base + llama.cpp build
        # needs ~25 GB. Drop every pre-installed toolchain we don't use.
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/.ghcup \
            /opt/hostedtoolcache \
            /usr/local/share/boost \
            /usr/local/share/powershell \
            /usr/share/swift \
            /opt/google \
            /usr/local/lib/heroku \
            /usr/lib/firefox \
            /usr/lib/mono \
            /opt/microsoft
          sudo apt-get remove -y --purge \
            azure-cli google-chrome-stable firefox powershell mono-devel \
            'libllvm.*' 'php.*' '^dotnet-.*' '^mongodb-.*' '^mysql-.*' \
            2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          docker system prune -af 2>/dev/null || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            CUDA_VERSION=cu1281
            TORCH_BACKEND=cu128
          tags: |
            ghcr.io/nilayyadav/unsloth-base:latest
            ghcr.io/nilayyadav/unsloth-base:cu128
